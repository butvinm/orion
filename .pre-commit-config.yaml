repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy python/lattigo/ python/orion-compiler/ python/orion-evaluator/
        language: system
        types: [python]
        pass_filenames: false
