[build-system]
requires = ["poetry-core>=1.0.2", "setuptools>=61.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "lattigo"
version = "0.1.0"
description = "Python bindings for Lattigo CKKS primitives"
authors = []
packages = [{include = "lattigo"}]

[tool.poetry.dependencies]
python = ">=3.9,<3.13"

[tool.poetry.build]
generate-setup-file = true
script = "build_bridge.py"
