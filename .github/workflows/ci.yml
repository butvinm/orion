name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libssl-dev

      - name: Build CGO bridges
        run: python tools/build_lattigo.py

      - name: Install Python packages
        run: uv sync

      - name: Ruff check
        run: uv run ruff check python/

      - name: Ruff format check
        run: uv run ruff format --check python/

      - name: Mypy
        run: uv run mypy python/lattigo/ python/orion-compiler/ python/orion-evaluator/

      - name: Go vet
        run: go vet ./...

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libssl-dev

      - name: Build CGO bridges
        run: python tools/build_lattigo.py

      - name: Install Python packages
        run: uv sync

      - name: Run Python tests
        run: uv run pytest python/tests/ -v

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run Go tests
        run: go test -v ./evaluator/...

  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        working-directory: js/lattigo
        run: npm install

      - name: Typecheck
        working-directory: js/lattigo
        run: npm run typecheck

      - name: Lint
        working-directory: js/lattigo
        run: npm run lint

      - name: Build
        working-directory: js/lattigo
        run: npm run build

      - name: Run JS tests
        working-directory: js/lattigo
        run: npm test
