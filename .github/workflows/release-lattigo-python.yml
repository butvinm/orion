name: Release Lattigo Python Bindings

on:
  push:
    tags:
      - "lattigo-py-v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            wheel_plat: manylinux_2_17_x86_64
          - os: macos-15-intel
            wheel_plat: macosx_11_0_x86_64
          - os: macos-14
            wheel_plat: macosx_11_0_arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libssl-dev

      - name: Build CGO bridges
        run: python tools/build_lattigo.py

      - name: Build Python wheel
        env:
          ORION_WHEEL_PLAT: ${{ matrix.wheel_plat }}
        run: |
          pip install hatchling build
          python -m build python/lattigo/ --outdir dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lattigo-python-dist-${{ matrix.wheel_plat }}
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: lattigo-python-dist-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: lattigo-python-dist-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
