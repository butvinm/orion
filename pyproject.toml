[tool.pytest.ini_options]
testpaths = ["python/tests"]

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "SIM105",  # contextlib.suppress — __del__ try/except/pass is canonical for Go handle cleanup
    "F403",    # star imports — intentional in nn/__init__.py
    "F405",    # may be undefined from star imports — consequence of F403
    "UP038",   # isinstance(x, A | B) — changes semantics (creates union type at runtime)
]

[tool.ruff.lint.per-file-ignores]
"python/lattigo/setup.py" = ["E402"]  # generated file, imports after setup_kwargs
"python/orion-evaluator/setup.py" = ["E402"]
"python/tests/*" = ["SIM115"]  # open().read() is fine in tests

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
disallow_untyped_defs = true
check_untyped_defs = true
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
exclude = ["build/", "dist/", "\\.egg-info/", "build_bridge\\.py", "setup\\.py"]
explicit_package_bases = true
mypy_path = "python/lattigo:python/orion-compiler:python/orion-evaluator"

[[tool.mypy.overrides]]
module = ["torch.*", "networkx.*", "tqdm.*", "scipy.*", "matplotlib.*", "torchvision.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*", "examples.*"]
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "orion_compiler.core.utils",
    "orion_compiler.core.tracer",
    "orion_compiler.core.packing",
    "orion_compiler.core.network_dag",
    "orion_compiler.core.level_dag",
    "orion_compiler.core.auto_bootstrap",
    "orion_compiler.core.fuser",
    "orion_compiler.core.galois",
]
disallow_untyped_defs = false
check_untyped_defs = false
ignore_errors = true
